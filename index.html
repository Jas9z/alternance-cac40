<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Alternance - Ingénierie d'Affaires & Tech</title>
    <style>
        :root { --primary: #1a365d; --secondary: #2b6cb0; --bg: #f7fafc; --text: #2d3748; --card-bg: #ffffff; --badge-bg: #edf2f7; --border: #e2e8f0; }
        [data-theme="dark"] { --primary: #63b3ed; --secondary: #4299e1; --bg: #1a202c; --text: #e2e8f0; --card-bg: #2d3748; --badge-bg: #4a5568; --border: #4a5568; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; transition: all 0.3s ease; }
        header { background-color: #1a365d; color: white; padding: 2rem; text-align: center; position: relative; }
        header h1 { margin: 0; font-size: 2.2rem; }
        .theme-toggle { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .controls { display: flex; gap: 15px; margin-bottom: 2rem; flex-wrap: wrap; }
        .search-bar { flex: 3; padding: 1rem; font-size: 1.1rem; border: 2px solid var(--border); border-radius: 8px; background: var(--card-bg); color: var(--text); outline: none; transition: 0.3s; }
        .filter-select { flex: 1; padding: 1rem; font-size: 1.1rem; border: 2px solid var(--border); border-radius: 8px; background: var(--card-bg); color: var(--text); cursor: pointer; }
        #compteur { font-weight: bold; margin-bottom: 15px; font-size: 1.1rem; }
        .job-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .job-card { background: var(--card-bg); padding: 1.5rem; border-radius: 10px; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.2s; }
        .job-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .job-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .job-date { font-size: 0.8rem; background: #c6f6d5; color: #22543d; padding: 4px 8px; border-radius: 12px; font-weight: bold; }
        [data-theme="dark"] .job-date { background: #22543d; color: #c6f6d5; }
        .job-info h2 { margin: 0 0 15px 0; color: var(--primary); font-size: 1.25rem; }
        .job-details { display: flex; flex-wrap: wrap; gap: 8px; font-size: 0.9rem; margin-bottom: 20px; }
        .job-details span { background: var(--badge-bg); padding: 6px 12px; border-radius: 15px; }
        .apply-btn { background-color: var(--secondary); color: white; text-align: center; text-decoration: none; padding: 12px; border-radius: 6px; font-weight: bold; display: block; }
    </style>
</head>
<body>
    <header>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        <h1>Radar Alternance - Ingénierie d'Affaires</h1>
        <p>Mobilité : Toute la France 🇫🇷</p>
    </header>

    <div class="container">
        <div class="controls">
            <input type="text" id="searchInput" class="search-bar" placeholder="Rechercher par mot-clé (ex: Data, Commercial)..." onkeyup="filterJobs()">
            <select id="companyFilter" class="filter-select" onchange="filterJobs()">
                <option value="">🏢 Toutes Entreprises</option>
            </select>
        </div>
        
        <div id="compteur">⏳ Chargement des offres...</div>
        <div id="jobList" class="job-grid"></div>
    </div>

    <script>
        let jobs = [];

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.querySelector('.theme-toggle');
            html.setAttribute('data-theme', html.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
            btn.innerText = html.getAttribute('data-theme') === 'light' ? '🌙' : '☀️';
        }

        async function loadJobs() {
            try {
                const response = await fetch('offres_cac40.json?' + new Date().getTime());
                jobs = await response.json();
                populateFilters(jobs);
                renderJobs(jobs);
            } catch (error) {
                document.getElementById('compteur').innerHTML = '<span style="color:red;">Erreur de chargement.</span>';
            }
        }

        function populateFilters(jobArray) {
            const compSelect = document.getElementById('companyFilter');
            const companies = [...new Set(jobArray.map(job => job.entreprise))].sort();
            companies.forEach(c => compSelect.innerHTML += `<option value="${c.toLowerCase()}">${c}</option>`);
        }

        function renderJobs(jobArray) {
            const jobList = document.getElementById('jobList');
            jobList.innerHTML = '';
            document.getElementById('compteur').innerText = `🎯 ${jobArray.length} offre(s) trouvée(s) en France`;

            jobArray.forEach(job => {
                const card = document.createElement('div');
                card.className = 'job-card';
                card.innerHTML = `
                    <div>
                        <div class="job-header"><span class="job-date">📅 ${job.date_ajout || "Récent"}</span></div>
                        <div class="job-info">
                            <h2>${job.titre}</h2>
                            <div class="job-details">
                                <span>🏢 <strong>${job.entreprise}</strong></span>
                                <span>📍 ${job.localisation}</span>
                            </div>
                        </div>
                    </div>
                    <a href="${job.lien}" class="apply-btn" target="_blank">Postuler sur LinkedIn</a>
                `;
                jobList.appendChild(card);
            });
        }

        function filterJobs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const comp = document.getElementById('companyFilter').value;

            const filtered = jobs.filter(job => {
                return (job.titre.toLowerCase().includes(query) || job.entreprise.toLowerCase().includes(query) || job.localisation.toLowerCase().includes(query)) &&
                       (comp === "" || job.entreprise.toLowerCase() === comp);
            });
            renderJobs(filtered);
        }

        loadJobs();
    </script>
</body>
</html>
