name: Scraper CAC40 Quotidien

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Installer Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt

      - name: Installer Google Chrome
        run: |
          sudo apt-get update -q
          wget -qO /tmp/google-chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/google-chrome.deb || sudo apt-get -f install -y
          google-chrome --version

      - name: Lancer le scraper (tentative 1)
        id: run1
        continue-on-error: true
        run: python scraper_ultime.py

      - name: Lancer le scraper (tentative 2 si échec)
        if: steps.run1.outcome == 'failure'
        run: |
          echo "⚠️ Tentative 1 échouée, retry dans 30s..."
          sleep 30
          python scraper_ultime.py

      - name: Vérifier le fichier JSON produit
        run: |
          if [ -f offres_cac40.json ]; then
            COUNT=$(python -c "import json; data=json.load(open('offres_cac40.json')); print(len(data))")
            echo "✅ $COUNT offres dans offres_cac40.json"
          else
            echo "❌ Fichier JSON introuvable"
            exit 1
          fi

      - name: Commit et push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add offres_cac40.json
          git diff --cached --quiet && echo "Rien à commiter." || git commit -m "🤖 $(date '+%d/%m/%Y %H:%M') — Mise à jour automatique des offres"
          git push
