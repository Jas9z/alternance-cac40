name: Scraper CAC40 Quotidien

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer les bibliothèques
        run: pip install selenium webdriver-manager

      - name: Lancer le script Python
        run: python scraper_ultime.py

      - name: Sauvegarder les nouvelles offres
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add offres_cac40.json
          git commit -m "🤖 Mise à jour automatique des offres" || exit 0
          git push
